name: Backend Deployment

on:
  push:
    branches:
      - main
    paths:
      - 'Application-Code/backend/**'
      - 'Kubernetes-Manifests-file/Backend/**'

permissions:
  id-token: write
  contents: read

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Configure AWS credentials (OIDC)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::077419561607:role/github-action-role
          aws-region: us-east-1

      # 3. Login to Amazon ECR (your exact command)
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region us-east-1 | \
          docker login --username AWS --password-stdin 077419561607.dkr.ecr.us-east-1.amazonaws.com

      # 4. Build Backend Docker Image (your command)
      - name: Build Backend Image
        run: |
          docker build -t backendapp ./Application-Code/backend

      # 5. Tag Image (your command)
      - name: Tag Backend Image
        run: |
          docker tag backendapp:latest \
          077419561607.dkr.ecr.us-east-1.amazonaws.com/backendapp:latest

      # 6. Push Image (your command)
      - name: Push Backend Image
        run: |
          docker push 077419561607.dkr.ecr.us-east-1.amazonaws.com/backendapp:latest

      # 7. Update kubeconfig for EKS
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region us-east-1 --name eksdemo1

      # 8. Deploy to Kubernetes
      - name: Deploy Backend to EKS
        run: |
          kubectl apply -f Kubernetes-Manifests-file/Backend/deployment.yaml