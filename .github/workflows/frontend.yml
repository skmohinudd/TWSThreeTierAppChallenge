name: Frontend Deployment

on:
  push:
    branches:
      - main
    paths:
      - 'Application-Code/frontend/**'
      - 'Kubernetes-Manifests-file/Frontend/**'

permissions:
  id-token: write
  contents: read

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::077419561607:role/github-action-role
          aws-region: us-east-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region us-east-1 | \
          docker login --username AWS --password-stdin 077419561607.dkr.ecr.us-east-1.amazonaws.com

      # 🔥 BUILD IMAGE WITH UNIQUE TAG (IMPORTANT FIX)
      - name: Build Frontend Image
        run: |
          docker build -t frontendapp:${GITHUB_SHA} ./Application-Code/frontend

      # 🔥 TAG IMAGE PROPERLY
      - name: Tag Image
        run: |
          docker tag frontendapp:${GITHUB_SHA} \
          077419561607.dkr.ecr.us-east-1.amazonaws.com/frontendapp:${GITHUB_SHA}

      # 🔥 PUSH IMAGE
      - name: Push Image
        run: |
          docker push 077419561607.dkr.ecr.us-east-1.amazonaws.com/frontendapp:${GITHUB_SHA}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region us-east-1 --name eksdemo1

      # 🔥 FORCE DEPLOY NEW IMAGE TO PODS
      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/frontend \
          frontend=077419561607.dkr.ecr.us-east-1.amazonaws.com/frontendapp:${GITHUB_SHA}

      # 🔥 WAIT FOR PODS TO UPDATE
      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/frontend